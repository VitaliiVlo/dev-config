# History
# Skip space-prefixed cmds — parity with zsh `setopt hist_ignore_space`
history_filter = [
  "^ ",
]
secrets_filter = true
strip_trailing_whitespace = true

# Search
search_mode = "fuzzy"
filter_mode = "global"
keymap_mode = "auto"
show_preview = true
enter_accept = false
ctrl_n_shortcuts = false
show_numeric_shortcuts = false

# Layout — Ctrl+R full-screen, Up arrow inline (~50% height)
inline_height = 0
inline_height_shell_up_key_binding = 20

# System (Brew owns updates)
update_check = false
